<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feed de Curtidas</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Feed de Fotos</h1>

<div class="container">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=600" alt="Praia">

    <h2>Praia</h2>
    <p>Um lindo dia de verão.</p>

    <button class="like">❤️ Curtir</button>

    <p>Curtidas: <span class="contador">0</span></p>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=600" alt="Montanha">

    <h2>Montanha</h2>
    <p>Paisagem incrível.</p>

    <button class="like">❤️ Curtir</button>

    <p>Curtidas: <span class="contador">0</span></p>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1470770841072-f978cf4d019e?w=600" alt="Cidade">

    <h2>Cidade</h2>
    <p>Luzes da cidade à noite.</p>

    <button class="like">❤️ Curtir</button>

    <p>Curtidas: <span class="contador">0</span></p>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
